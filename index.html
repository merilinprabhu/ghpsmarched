<!DOCTYPE html>
<html lang="kn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHPS Marched - Modern Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .animate-pulse-slow {
      animation: pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.1); opacity: 0.25; }
    }
  </style>
</head>
<body class="bg-[#0f172a] bg-gradient-to-tr from-[#0f172a] via-[#1e1b4b] to-[#0f172a] flex flex-col items-center justify-center min-h-screen py-10 px-4 relative">
  
  <div class="absolute w-[500px] h-[500px] bg-indigo-600 rounded-full blur-[120px] opacity-20 -top-40 -left-20 pointer-events-none animate-pulse-slow"></div>
  <div class="absolute w-[500px] h-[500px] bg-blue-500 rounded-full blur-[120px] opacity-20 -bottom-40 -right-20 pointer-events-none animate-pulse-slow" style="animation-delay: 3s;"></div>

  <div class="glass-card p-8 rounded-3xl shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] w-full max-w-md transform transition-all duration-500">
    
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white/10 rounded-2xl border border-white/20 shadow-lg mb-4 overflow-hidden p-1.5"><img src="https://gsayvnnnfrrkwdfwocbu.supabase.co/storage/v1/object/public/school-logo/Gemini_Generated_Image_pjk3eppjk3eppjk3.png" alt="School Logo" class="w-full h-full object-contain"></div>
      <h1 class="text-xl font-bold text-white tracking-wide uppercase">GHPS Marched</h1>
      <p class="text-[11px] font-semibold text-indigo-200 tracking-widest uppercase opacity-80 mt-1">Govt Higher Primary School</p>
      <div class="w-12 h-[3px] bg-gradient-to-r from-blue-400 to-indigo-400 mx-auto mt-3 rounded-full"></div>
    </div>

    <h2 id="formTitle" class="text-sm font-medium mb-6 text-center text-indigo-100/80 tracking-wide">School Management System</h2>

    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">User Name / ಬಳಕೆದಾರರ ಹೆಸರು</label>
        <input type="text" id="loginUsername" placeholder="User Name / ಬಳಕೆದಾರರ ಹೆಸರು" class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 transition-all text-gray-800 text-sm shadow-inner" required>
      </div>
      <div>
        <div class="flex justify-between items-center mb-1.5 ml-1">
          <label class="text-white text-xs font-semibold tracking-wider uppercase opacity-90">Password</label>
          <a href="#" onclick="toggleForm('forgot')" class="text-xs text-indigo-300 hover:text-white font-medium transition">Forgot Password?</a>
        </div>
        <input type="password" id="loginPassword" placeholder="••••••••" class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 transition-all text-gray-800 text-sm shadow-inner" required>
      </div>
      <div class="pt-3">
        <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 active:scale-[0.99] text-white font-semibold py-3 rounded-xl transition duration-300 text-sm tracking-wide shadow-lg shadow-indigo-950/50">Login</button>
      </div>
      <p class="mt-6 text-xs text-center text-indigo-200/70">New user? <a href="#" onclick="toggleForm('register')" class="text-blue-300 hover:text-white font-semibold hover:underline transition ml-1">Register here</a></p>
    </form>

    <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();" class="hidden space-y-4">
      <!-- Registration Type Selection -->
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">I want to / ನನ್ನ ಆಯ್ಕೆ</label>
        <select id="regType" onchange="toggleRegFields(this.value)" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-700 text-sm bg-white/70">
          <option value="new_school">Register a New School / ಹೊಸ ಶಾಲೆ ನೋಂದಾಯಿಸಿ</option>
          <option value="join_school">Join an Existing School / ಹಾಲಿ ಶಾಲೆಗೆ ಸೇರಿ</option>
        </select>
      </div>

      <!-- New School Input Fields -->
      <div id="newSchoolFields" class="space-y-3">
        <div>
          <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">School Name (English) *</label>
          <input type="text" id="schoolNameEn" placeholder="e.g. GHPS MARCHED" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm">
        </div>
        <div>
          <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">ಶಾಲೆಯ ಹೆಸರು (ಕನ್ನಡ) *</label>
          <input type="text" id="schoolNameKn" placeholder="ಉದಾ. ಜಿ.ಹೆಚ್.ಪಿ.ಎಸ್. ಮರ್ಚೆಡ್" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm">
        </div>
        <div>
          <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">School UDISE Code *</label>
          <input type="text" id="schoolUdise" placeholder="e.g. 29060709801" maxlength="11" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm">
        </div>
      </div>

      <!-- Join Existing School Fields -->
      <div id="joinSchoolFields" class="hidden">
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Select School / ಶಾಲೆ ಆರಿಸಿ *</label>
        <select id="regSchoolSelect" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-700 text-sm bg-white/70">
          <option value="">-- Select a School / ಶಾಲೆ ಆರಿಸಿ --</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Full Name</label>
          <input type="text" id="regName" placeholder="Full Name" class="glass-input w-full px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm" required>
        </div>
        <div>
          <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Username</label>
          <input type="text" id="regUsername" placeholder="username123" class="glass-input w-full px-3 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm" required>
        </div>
      </div>
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Phone Number</label>
        <input type="tel" id="regPhone" placeholder="9876543210" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm" required>
      </div>
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Email Address</label>
        <input type="email" id="regEmail" placeholder="name@school.com" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm" required>
      </div>
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-800 text-sm" required>
      </div>
      <div id="roleSelectionField">
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Role</label>
        <select id="regRole" class="glass-input w-full px-4 py-2.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 text-gray-700 text-sm bg-white/70">
          <option value="Teacher">Teacher</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="pt-2">
        <button type="submit" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 active:scale-[0.99] text-white font-semibold py-3 rounded-xl transition duration-300 text-sm tracking-wide shadow-lg">Register Account</button>
      </div>
      <p class="mt-4 text-xs text-center text-indigo-200/70">Already have an account? <a href="#" onclick="toggleForm('login')" class="text-blue-300 hover:text-white font-semibold hover:underline transition ml-1">Login here</a></p>
    </form>

    <form id="forgotForm" onsubmit="event.preventDefault(); handleForgotPassword();" class="hidden space-y-4">
      <p class="text-xs text-indigo-200/80 text-center mb-2">ನಿಮ್ಮ ಖಾತೆಯ ಇಮೇಲ್ ವಿಳಾಸವನ್ನು ನಮೂದಿಸಿ. ಪಾಸ್‌ವರ್ಡ್ ಮರುಹೊಂದಿಸುವ ಲಿಂಕ್ ಅನ್ನು ಕಳುಹಿಸಲಾಗುವುದು.</p>
      <div>
        <label class="block text-white text-xs font-semibold tracking-wider uppercase mb-1.5 ml-1 opacity-90">Registered Email</label>
        <input type="email" id="forgotEmail" placeholder="name@school.com" class="glass-input w-full px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:bg-white/80 transition-all text-gray-800 text-sm shadow-inner" required>
      </div>
      <div class="pt-2">
        <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 active:scale-[0.99] text-white font-semibold py-3 rounded-xl transition duration-300 text-sm tracking-wide shadow-lg">Reset Password</button>
      </div>
      <p class="mt-6 text-xs text-center text-indigo-200/70">Back to <a href="#" onclick="toggleForm('login')" class="text-blue-300 hover:text-white font-semibold hover:underline transition ml-1">Login</a></p>
    </form>

    <div id="message" class="mt-4 text-xs text-center hidden p-3 rounded-xl font-medium border backdrop-blur-md"></div>
  </div>

  <footer class="mt-8 text-center text-indigo-300/50 text-xs tracking-wider">
    <p class="font-light">Designed & Developed by <span class="font-medium text-indigo-200 hover:text-white transition cursor-pointer border-b border-indigo-400/30 pb-0.5">Marilin Prabhu</span></p>
  </footer>

  <script>
    const supabaseUrl = "https://gsayvnnnfrrkwdfwocbu.supabase.co";
    const supabaseKey = "sb_publishable_Q92Byh3WyIwhrsJ0YNKO4w_sqx3tHMS";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    window.onload = async function() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        try {
          const { data: profile } = await supabaseClient
            .from('profiles')
            .select('role, school_id')
            .eq('id', session.user.id)
            .single();
          if (profile) {
            if (profile.role === 'developer') {
              window.location.href = "developer.html";
              return;
            }
            if (profile.school_id) {
              const { data: school } = await supabaseClient
                .from('schools')
                .select('is_approved')
                .eq('id', profile.school_id)
                .single();
              if (school && school.is_approved === false) {
                await supabaseClient.auth.signOut();
                return;
              }
            }
          }
        } catch (e) {
          console.error("Session check error:", e);
        }
        window.location.href = "dashboard.html";
      }
    };

    function toggleRegFields(val) {
      const newSchool = document.getElementById('newSchoolFields');
      const joinSchool = document.getElementById('joinSchoolFields');
      const roleSel = document.getElementById('roleSelectionField');
      const regRole = document.getElementById('regRole');

      if (val === 'new_school') {
        newSchool.classList.remove('hidden');
        joinSchool.classList.add('hidden');
        roleSel.classList.add('hidden'); // Force Admin role for new school creators
        regRole.value = 'Admin';
      } else {
        newSchool.classList.add('hidden');
        joinSchool.classList.remove('hidden');
        roleSel.classList.remove('hidden');
        regRole.value = 'Teacher';
        loadExistingSchoolsList();
      }
    }

    async function loadExistingSchoolsList() {
      const select = document.getElementById('regSchoolSelect');
      select.innerHTML = '<option value="">-- Loading Schools... --</option>';
      try {
        const { data, error } = await supabaseClient
          .from('schools')
          .select('id, school_name_en, school_name_kn, udise_code')
          .order('school_name_en', { ascending: true });
        
        if (error) throw error;
        
        let html = '<option value="">-- Select a School / ಶಾಲೆ ಆರಿಸಿ --</option>';
        (data || []).forEach(s => {
          html += `<option value="${s.id}">${s.school_name_en} (${s.school_name_kn}) [${s.udise_code}]</option>`;
        });
        select.innerHTML = html;
      } catch (err) {
        console.error("Error loading schools list:", err);
        select.innerHTML = '<option value="">Failed to load schools list / ಶಾಲೆ ಲೋಡ್ ಮಾಡಲು ವಿಫಲವಾಗಿದೆ</option>';
      }
    }

    function toggleForm(type) {
      document.getElementById('message').classList.add('hidden');
      
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('forgotForm').classList.add('hidden');
      
      if (type === 'register') {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('formTitle').innerText = "Register Account";
        document.getElementById('regType').value = "new_school";
        toggleRegFields("new_school");
      } else if (type === 'forgot') {
        document.getElementById('forgotForm').classList.remove('hidden');
        document.getElementById('formTitle').innerText = "Reset Password";
      } else {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('formTitle').innerText = "School Management System";
      }
    }

    function showMessage(text, isSuccess) {
      const msgDiv = document.getElementById('message');
      msgDiv.innerText = text;
      msgDiv.classList.remove('hidden', 'bg-red-500/20', 'text-red-200', 'border-red-500/30', 'bg-emerald-500/20', 'text-emerald-200', 'border-emerald-500/30');
      
      if (isSuccess) {
        msgDiv.classList.add('bg-emerald-500/20', 'text-emerald-200', 'border-emerald-500/30');
      } else {
        msgDiv.classList.add('bg-red-500/20', 'text-red-200', 'border-red-500/30');
      }
      msgDiv.classList.remove('hidden');
    }

    async function handleLogin() {
      const userInput = document.getElementById('loginUsername').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if(!userInput || !pass) { showMessage("ದಯವಿಟ್ಟು ಎಲ್ಲಾ ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ.", false); return; }
      showMessage("ಲಾಗಿನ್ ಆಗುತ್ತಿದೆ...", true);

      try {
        let email = userInput;

        // If it doesn't look like an email address, treat as username and lookup email
        if (!userInput.includes('@')) {
          const { data: profile, error: lookupErr } = await supabaseClient
            .from('profiles')
            .select('email')
            .eq('username', userInput)
            .maybeSingle();

          if (lookupErr) {
            console.error("Username profile lookup error:", lookupErr);
          }

          if (profile && profile.email) {
            email = profile.email;
          } else {
            showMessage("ಬಳಕೆದಾರರ ಹೆಸರು ಕಂಡುಬಂದಿಲ್ಲ / Username not found.", false);
            return;
          }
        }

        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: pass
        });

        if (error) {
          if (error.message.includes("Email not confirmed")) {
            showMessage("ನಿಮ್ಮ ಇಮೇಲ್ ಇನ್ನೂ ದೃಢೀಕರಿಸಲ್ಪಟ್ಟಿಲ್ಲ. ದಯವಿಟ್ಟು ನಿಮ್ಮ ಇನ್‌ಬಾಕ್ಸ್ ಪರಿಶೀಲಿಸಿ. / Email not confirmed. Please check your inbox.", false);
          } else {
            showMessage(error.message, false);
          }
          return;
        }

        // Fetch user profile from the database (including role)
        const { data: profile, error: profileErr } = await supabaseClient
          .from('profiles')
          .select('name, school_id, role')
          .eq('id', data.user.id)
          .single();

        if (profile && profile.role === 'developer') {
          showMessage("ಡೆವಲಪರ್ ಲಾಗಿನ್ ಯಶಸ್ವಿಯಾಗಿದೆ!", true);
          setTimeout(() => {
            window.location.href = "developer.html";
          }, 1200);
          return;
        }

        if (profile && profile.school_id) {
          try {
            const { data: school } = await supabaseClient
              .from('schools')
              .select('school_name_en, school_name_kn, udise_code, is_approved')
              .eq('id', profile.school_id)
              .single();
            
            if (school) {
              if (school.is_approved === false) {
                await supabaseClient.auth.signOut();
                showMessage("ನಿಮ್ಮ ಶಾಲೆಯು ಇನ್ನೂ ಡೆವಲಪರ್‌ನಿಂದ ಅನುಮೋದಿಸಲ್ಪಟ್ಟಿಲ್ಲ. ದಯವಿಟ್ಟು ಅನುಮೋದನೆಗಾಗಿ ಕಾಯಿರಿ.", false);
                return;
              }
              localStorage.setItem('school_name_en', school.school_name_en || '');
              localStorage.setItem('school_name_kn', school.school_name_kn || '');
              localStorage.setItem('school_udise', school.udise_code || '');
            }
          } catch (schErr) {
            console.error("Error fetching school details:", schErr);
          }
        } else {
          localStorage.removeItem('school_name_en');
          localStorage.removeItem('school_name_kn');
          localStorage.removeItem('school_udise');
        }

        const name = profile ? profile.name : (data.user.user_metadata.name || "ಬಳಕೆದಾರ");
        showMessage("ಲಾಗಿನ್ ಯಶಸ್ವಿಯಾಗಿದೆ! ಸುಸ್ವಾಗತ " + name, true);
        
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1200);
      } catch (err) {
        showMessage("ಲಾಗಿನ್ ದೋಷ: " + err.message, false);
      }
    }

    async function handleRegister() {
      const regType = document.getElementById('regType').value;
      const name = document.getElementById('regName').value;
      const username = document.getElementById('regUsername').value;
      const phone = document.getElementById('regPhone').value;
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;

      if(!name || !username || !phone || !email || !pass) {
        showMessage("ದಯವಿಟ್ಟು ಎಲ್ಲಾ ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ.", false);
        return;
      }

      let schoolId = null;

      if (regType === 'new_school') {
        const schEn = document.getElementById('schoolNameEn').value.trim();
        const schKn = document.getElementById('schoolNameKn').value.trim();
        const schUdise = document.getElementById('schoolUdise').value.trim();

        if (!schEn || !schKn || !schUdise) {
          showMessage("ದಯವಿಟ್ಟು ಹೊಸ ಶಾಲೆಯ ಎಲ್ಲಾ ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ.", false);
          return;
        }

        showMessage("ಹೊಸ ಶಾಲೆಯನ್ನು ನಮೂದಿಸಲಾಗುತ್ತಿದೆ...", true);
        try {
          // Check if UDISE code already exists
          const { data: existingSch, error: checkErr } = await supabaseClient
            .from('schools')
            .select('id')
            .eq('udise_code', schUdise)
            .maybeSingle();

          if (checkErr) throw checkErr;
          if (existingSch) {
            showMessage("ಈ UDISE ಕೋಡ್ ಹೊಂದಿರುವ ಶಾಲೆ ಈಗಾಗಲೇ ನೋಂದಾಯಿಸಲ್ಪಟ್ಟಿದೆ.", false);
            return;
          }

          // Insert school
          const { data: newSch, error: insertSchErr } = await supabaseClient
            .from('schools')
            .insert({
              school_name_en: schEn,
              school_name_kn: schKn,
              udise_code: schUdise
            })
            .select('id')
            .single();

          if (insertSchErr) throw insertSchErr;
          schoolId = newSch.id;

        } catch (err) {
          showMessage("ಶಾಲೆ ನೋಂದಣಿ ದೋಷ: " + err.message, false);
          return;
        }
      } else {
        schoolId = document.getElementById('regSchoolSelect').value;
        if (!schoolId) {
          showMessage("ದಯವಿಟ್ಟು ನಿಮ್ಮ ಶಾಲೆಯನ್ನು ಆಯ್ಕೆ ಮಾಡಿ.", false);
          return;
        }
      }

      showMessage("ಖಾತೆಯನ್ನು ಸೃಷ್ಟಿಸಲಾಗುತ್ತಿದೆ...", true);

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: pass,
          options: {
            data: {
              name: name,
              username: username,
              phone: phone,
              role: role,
              school_id: schoolId
            }
          }
        });

        if (error) {
          showMessage(error.message, false);
          return;
        }

        if (data.user) {
          // Insert details to profiles table
          const { error: profileErr } = await supabaseClient
            .from('profiles')
            .insert({
              id: data.user.id,
              email: email,
              name: name,
              username: username,
              phone: phone,
              role: role,
              school_id: schoolId
            });

          if (profileErr) {
            console.error("Profiles insertion error:", profileErr);
            showMessage("ಪ್ರೊಫೈಲ್ ಸೃಷ್ಟಿ ವಿಫಲವಾಗಿದೆ: " + profileErr.message + " / Profile creation failed: " + profileErr.message, false);
            return;
          }

          showMessage("ನೋಂದಣಿ ಯಶಸ್ವಿಯಾಗಿದೆ! ದಯವಿಟ್ಟು ಲಾಗಿನ್ ಮಾಡಿ.", true);
          setTimeout(() => toggleForm('login'), 2000);
        }
      } catch (err) {
        showMessage("ನೋಂದಣಿ ದೋಷ: " + err.message, false);
      }
    }

    async function handleForgotPassword() {
      const email = document.getElementById('forgotEmail').value;
      if(!email) { showMessage("ದಯವಿಟ್ಟು ಇಮೇಲ್ ಐಡಿ ನಮೂದಿಸಿ.", false); return; }
      showMessage("ಪರಿಶೀಲಿಸಲಾಗುತ್ತಿದೆ...", true);

      try {
        const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email);
        if (error) {
          showMessage(error.message, false);
        } else {
          showMessage("ಪಾಸ್‌ವರ್ಡ್ ಮರುಹೊಂದಿಸುವ ಲಿಂಕ್ ಅನ್ನು ನಿಮ್ಮ ಇಮೇಲ್‌ಗೆ ಕಳುಹಿಸಲಾಗಿದೆ.", true);
        }
      } catch (err) {
        showMessage("ದೋಷ: " + err.message, false);
      }
    }
  </script>
</body>
</html>
