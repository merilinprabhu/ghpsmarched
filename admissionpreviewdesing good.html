<!DOCTYPE html>

      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toggle-switch-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px;
      border-radius: 12px;
      display: inline-flex;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toggle-btn {
      padding: 6px 20px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;

    }

      border-bottom: 1px solid var(--glass-border);
    }

    .glass-container {

      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);

    }

      padding: 24px;

<script>
  const supabaseUrl = "https://gsayvnnnfrrkwdfwocbu.supabase.co";
  const supabaseKey = "sb_publishable_Q92Byh3WyIwhrsJ0YNKO4w_sqx3tHMS";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  let sessionUser = null;

  window.onload = async function() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = "index.html";
      return;
    }
    sessionUser = session.user;

    // Dynamically generate unique Application No. on load
    const appNoInput = document.querySelector('input[name="appNo"]');
    if (appNoInput && (appNoInput.value === 'GHPS-2026-0492' || !appNoInput.value)) {
      const randNo = Math.floor(1000 + Math.random() * 9000);
      appNoInput.value = `GHPS-2026-${randNo}`;
    }
  };

  document.getElementById('admissionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Show loading state
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> ಉಳಿಸಲಾಗುತ್ತಿದೆ / Saving...';

    const formData = new FormData(e.target);
    
    // Map date values safely (empty string to null for Postgres date columns)
    const getOptionalDate = (name) => {
      const val = formData.get(name);
      return val ? val : null;
    };

    const data = {
      academic_year: formData.get('academicYear'),
      medium: formData.get('medium'),
      enroll_class: formData.get('enrollClass'),
      app_no: formData.get('appNo'),
      student_name: formData.get('studentName'),
      name_english: formData.get('nameEnglish'),
      dob: formData.get('dob'),
      gender: formData.get('gender'),
      student_aadhaar: formData.get('studentAadhaar'),
      religion: formData.get('religion'),
      caste: formData.get('caste'),
      social_class: formData.get('socialClass'),
      mother_tongue: formData.get('motherTongue'),
      mobile_number: formData.get('mobileNumber'),
      special_need: formData.get('specialNeed'),
      special_category: formData.get('specialCategory'),
      bhagyalakshmi_bond: formData.get('bhagyalakshmiBond'),
      age_reason: formData.get('ageReason'),
      address: formData.get('address'),
      bank_acc_no: formData.get('bankAccNo'),
      ifsc_code: formData.get('ifscCode'),
      bank_address: formData.get('bankAddress'),
      scholarship_no: formData.get('scholarshipNo'),
      student_caste_cert: formData.get('studentCasteCert'),
      student_income_cert: formData.get('studentIncomeCert'),
      bpl_card_no: formData.get('bplCardNo'),
      father_name_kn: formData.get('fatherNameKn'),
      father_aadhaar: formData.get('fatherAadhaar'),
      father_occupation: formData.get('fatherOccupation'),
      mother_name_kn: formData.get('motherNameKn'),
      mother_aadhaar: formData.get('motherAadhaar'),
      mother_occupation: formData.get('motherOccupation'),
      preschool_board: formData.get('preschoolBoard'),
      preschool_type: formData.get('preschoolType'),
      preschool_name: formData.get('preschoolName'),
      transfer_no: formData.get('transferNo'),
      transfer_date: getOptionalDate('transferDate'),
      student_sts: formData.get('studentSts'),
      created_by: sessionUser ? sessionUser.id : null
    };

    try {
      const { data: insertData, error } = await supabaseClient
        .from('admissions')
        .insert(data);

      if (error) {
        alert("ಡೇಟಾ ಉಳಿಸಲು ಸಾಧ್ಯವಾಗಲಿಲ್ಲ: " + error.message);
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      } else {
        alert("ವಿದ್ಯಾರ್ಥಿ ವಿವರಗಳನ್ನು ಯಶಸ್ವಿಯಾಗಿ ಉಳಿಸಲಾಗಿದೆ!");
        window.location.href = "dashboard.html";
      }
    } catch (err) {
      alert("ದೋಷ ಸಂಭವಿಸಿದೆ: " + err.message);
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
    }
  });
</script>
</body>
